<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Analytics Track | EduVerse</title>
  <meta name="description" content="Pelajari materi Data Analytics secara komprehensif.">

  <!-- Styles -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  

</head>
<body>

  <div class="interactive-container">
    
    <!-- Sidebar: Module List -->
    <aside class="interactive-sidebar">
      <div class="interactive-sidebar-header">
        <a href="dashboard.html" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: inherit; text-decoration: none;">
          <i class="fa-solid fa-arrow-left"></i>
          <span style="font-family: var(--font-heading); font-weight: 800;">Kembali ke Dashboard</span>
        </a>
        <h2 style="margin-top: 1rem; font-size: 1.25rem;">Memuat Track...</h2>
        <p style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;" id="sidebar-module-count">Menghitung modul...</p>
      </div>
      <div id="module-list">
        <!-- Rendered by JS -->
      </div>
    </aside>

    <!-- Main Content -->
    <main class="interactive-main" style="overflow-y: auto; background: var(--bg-page);">
      
      <!-- Topbar -->
      <div class="interactive-topbar" style="position: sticky; top: 0; z-index: 10;">
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <button class="mobile-track-menu-btn" onclick="document.querySelector('.interactive-sidebar').classList.toggle('show-dropdown')" aria-label="Toggle Menu">
            <i class="fa-solid fa-bars"></i>
          </button>
          <span class="neo-badge neo-badge-lemon" id="topbar-title">Memuat...</span>
        </div>
        <div style="display: flex; gap: 1rem; align-items: center;">
          <span class="neo-badge neo-badge-orange">
            <span class="streak-fire" id="user-streak">🔥 1</span>
          </span>
          <button id="btn-next-module" aria-label="Lanjut ke Modul Berikutnya" class="neo-btn neo-btn-primary neo-btn-sm hidden">
            Lanjut ke Modul Berikutnya <i class="fa-solid fa-arrow-right"></i>
          </button>
        </div>
      </div>

      <!-- Workspace: Theory + Quiz -->
      <div class="lesson-content-wrapper">
        
          <div id="step-theory">
            <div id="theory-content" class="theory-content" style="font-size: 1.1rem; line-height: 1.7;">
              <!-- Rendered by JS -->
            </div>
          </div>

          <!-- Quiz Section -->
          <div id="quiz-section" class="quiz-section hidden" style="margin-top: 0; padding-top: 0; border-top: none;">
            <h3 style="margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;">
              <i class="fa-solid fa-clipboard-question" style="color: var(--primary);"></i> 
              Kuis Cepat
            </h3>
            <p id="quiz-question" style="font-weight: 600; font-size: 1.1rem; margin-bottom: 1.5rem;"></p>
            <div id="quiz-options">
              <!-- Rendered by JS -->
            </div>
            
            <div id="quiz-feedback" style="margin-top: 1.5rem; font-weight: 700;" class="hidden"></div>
          </div>

      </div>

    </main>
  </div>

  <!-- Lesson Logic -->
  <script type="module" src="../assets/js/pages/lesson.js?v=5"></script>

</body>
</html>
