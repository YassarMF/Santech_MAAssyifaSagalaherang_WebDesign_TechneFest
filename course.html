<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Materi Belajar | EduVerse</title>
  <meta name="description" content="Ikuti syllabus interaktif Data Analyst Track. Selesaikan modul demi modul dan kuasai skill analisis data!">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="app-sidebar"></aside>
    <main class="main-content">

      <!-- Syllabus Header -->
      <div class="syllabus-header">
        <div class="syllabus-header-icon">📊</div>
        <div class="syllabus-header-info">
          <h1>Data Analyst Track</h1>
          <p>Kuasai skill Data Analyst dari nol — 8 modul interaktif</p>
        </div>
        <div class="syllabus-progress">
          <div class="syllabus-progress-ring" id="progress-ring">
            <div class="syllabus-progress-ring-inner" id="progress-text">0/8</div>
          </div>
        </div>
      </div>

      <!-- Progress Bar -->
      <div class="neo-card-static neo-card-lemon" style="margin-bottom: 2rem; padding: 1rem 1.5rem;">
        <div class="xp-bar-container" style="height: 10px;">
          <div class="xp-bar-fill" id="syllabus-progress-bar" style="width: 0%; background: linear-gradient(90deg, var(--success), #34D399);"></div>
        </div>
        <div style="display: flex; justify-content: space-between; margin-top: 0.5rem;">
          <span style="font-family: var(--font-heading); font-weight: 700; font-size: 0.75rem; color: var(--text-muted);">Progress</span>
          <span style="font-family: var(--font-heading); font-weight: 800; font-size: 0.75rem; color: var(--success);" id="progress-percent">0%</span>
        </div>
      </div>

      <!-- Syllabus Game Map -->
      <div class="syllabus-map" id="syllabus-map">
        <!-- Nodes rendered by JS -->
      </div>

    </main>
    <nav class="mobile-nav" id="mobile-nav"></nav>
  </div>

  <!-- Lesson Modal (reused from dashboard pattern) -->
  <div class="modal-overlay" id="lesson-modal">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <span id="modal-icon" style="font-size: 1.5rem; margin-right: 0.5rem;"></span>
          <span id="modal-title" style="font-family: var(--font-heading); font-weight: 900; font-size: 1.2rem;"></span>
        </div>
        <button class="modal-close" id="modal-close-btn" aria-label="Tutup">✕</button>
      </div>
      <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
        <div id="step-indicator-1" style="flex: 1; height: 6px; background: var(--primary); border-radius: var(--radius-full); border: 1px solid var(--border); transition: background 0.3s;"></div>
        <div id="step-indicator-2" style="flex: 1; height: 6px; background: var(--gray-200); border-radius: var(--radius-full); border: 1px solid var(--border); transition: background 0.3s;"></div>
      </div>
      <div id="step-theory">
        <div class="neo-badge neo-badge-purple" style="margin-bottom: 1rem;"><i class="fa-solid fa-book-open"></i> Materi Pembelajaran</div>
        <div class="theory-content" id="theory-content"></div>
        <button class="neo-btn neo-btn-primary neo-btn-block" style="margin-top: 1.5rem;" id="btn-goto-quiz">Lanjut ke Quiz! 🎯</button>
      </div>
      <div id="step-quiz" class="hidden">
        <div class="neo-badge neo-badge-orange" style="margin-bottom: 1rem;"><i class="fa-solid fa-question-circle"></i> Quiz Time!</div>
        <h3 id="quiz-question" style="font-size: 1.1rem; margin-bottom: 1.25rem; line-height: 1.4;"></h3>
        <div id="quiz-options"></div>
        <div id="quiz-feedback" class="hidden"></div>
        <button id="btn-next-module" class="neo-btn neo-btn-success neo-btn-block hidden" style="margin-top: 1rem;">Lanjut ke Modul Berikutnya →</button>
      </div>
    </div>
  </div>

  <style>
    .theory-content h3 { font-family: var(--font-heading); font-size: 1.25rem; margin-bottom: 0.75rem; color: var(--text); }
    .theory-content p { margin-bottom: 0.75rem; line-height: 1.7; font-size: 0.95rem; }
    .theory-content ul { margin-bottom: 0.75rem; padding-left: 1.5rem; }
    .theory-content li { margin-bottom: 0.4rem; line-height: 1.5; font-size: 0.93rem; }
    .theory-content code { background: var(--card-lemon); padding: 0.15rem 0.4rem; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 0.88rem; border: 1px solid var(--border); }
    .theory-content strong { color: var(--text); }
    .theory-content em { color: var(--primary); font-style: normal; font-weight: 600; }
    .quiz-feedback { padding: 1rem 1.25rem; border-radius: var(--radius-sm); font-family: var(--font-heading); font-weight: 800; font-size: 1rem; text-align: center; margin-top: 1rem; border: var(--border-w) solid var(--border); box-shadow: var(--shadow-sm); }
    .quiz-feedback-correct { background: var(--card-mint); color: #065F46; }
    .quiz-feedback-wrong { background: var(--card-pink); color: #991B1B; }
  </style>

  <script type="module">
    import { AppState, ModuleData, UI } from './js/app.js';

    if (!AppState.requireAuth()) { /* redirects */ }

    let currentUser = AppState.getUser();
    let activeModuleIndex = -1;

    UI.renderSidebar('course');
    UI.renderMobileNav('course');

    // Module images using picsum with consistent seeds
    const moduleImages = [
      'https://picsum.photos/seed/data-intro/240/180',
      'https://picsum.photos/seed/excel-sheet/240/180',
      'https://picsum.photos/seed/statistics/240/180',
      'https://picsum.photos/seed/database-sql/240/180',
      'https://picsum.photos/seed/data-chart/240/180',
      'https://picsum.photos/seed/python-code/240/180',
      'https://picsum.photos/seed/analysis/240/180',
      'https://picsum.photos/seed/machine-learn/240/180'
    ];

    function renderSyllabus() {
      currentUser = AppState.getUser();
      const completed = currentUser.completedModules || [];
      const mapContainer = document.getElementById('syllabus-map');
      const progressPercent = Math.round((completed.length / ModuleData.length) * 100);

      // Update progress ring
      document.getElementById('progress-text').textContent = `${completed.length}/${ModuleData.length}`;
      document.getElementById('progress-ring').style.setProperty('--progress', `${progressPercent}%`);
      document.getElementById('progress-percent').textContent = `${progressPercent}%`;
      setTimeout(() => {
        document.getElementById('syllabus-progress-bar').style.width = `${progressPercent}%`;
      }, 200);

      let mapHTML = '';
      ModuleData.forEach((mod, index) => {
        const isCompleted = completed.includes(mod.id);
        const isUnlocked = index === 0 || completed.includes(ModuleData[index - 1].id);

        let stateClass = 'node-locked';
        let badgeText = '<i class="fa-solid fa-lock"></i> Terkunci';
        let badgeBg = '';

        if (isCompleted) {
          stateClass = 'node-completed';
          badgeText = '<i class="fa-solid fa-check"></i> Selesai';
        } else if (isUnlocked) {
          stateClass = 'node-unlocked';
          badgeText = '<i class="fa-solid fa-play"></i> Mulai Belajar';
        }

        // Add connector between nodes (except before first)
        if (index > 0) {
          const prevCompleted = completed.includes(ModuleData[index - 1].id);
          mapHTML += `<div class="syllabus-node-connector ${prevCompleted ? 'completed' : ''}"></div>`;
        }

        mapHTML += `
          <div class="syllabus-node ${stateClass}" data-index="${index}" id="syllabus-node-${index}">
            <img src="${moduleImages[index]}" alt="${mod.title}" class="syllabus-node-image" loading="lazy">
            <div class="syllabus-node-content">
              <div class="syllabus-node-title">${mod.icon} ${mod.title}</div>
              <div class="syllabus-node-desc">${mod.description}</div>
              <span class="syllabus-node-badge">${badgeText}</span>
            </div>
          </div>
        `;
      });

      mapContainer.innerHTML = mapHTML;

      // Attach click events
      mapContainer.querySelectorAll('.syllabus-node:not(.node-locked)').forEach(node => {
        node.addEventListener('click', () => {
          const index = parseInt(node.dataset.index);
          openLesson(index);
        });
      });

      mapContainer.querySelectorAll('.syllabus-node.node-locked').forEach(node => {
        node.addEventListener('click', () => {
          UI.showToast('Selesaikan modul sebelumnya dulu ya! 🔒', 'info');
        });
      });
    }

    function openLesson(index) {
      activeModuleIndex = index;
      const mod = ModuleData[index];
      if (!mod) return;

      const modal = document.getElementById('lesson-modal');
      document.getElementById('step-theory').classList.remove('hidden');
      document.getElementById('step-theory').style.display = 'block';
      document.getElementById('step-quiz').classList.add('hidden');
      document.getElementById('step-quiz').style.display = 'none';
      document.getElementById('quiz-feedback').classList.add('hidden');
      document.getElementById('btn-next-module').classList.add('hidden');
      document.getElementById('btn-next-module').style.display = 'none';

      document.getElementById('step-indicator-1').style.background = 'var(--primary)';
      document.getElementById('step-indicator-2').style.background = 'var(--gray-200)';

      document.getElementById('modal-icon').textContent = mod.icon;
      document.getElementById('modal-title').textContent = mod.title;
      document.getElementById('theory-content').innerHTML = mod.theory;

      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('lesson-modal').classList.remove('active');
      document.body.style.overflow = '';
      activeModuleIndex = -1;
    }

    document.getElementById('modal-close-btn').addEventListener('click', closeModal);
    document.getElementById('lesson-modal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    document.getElementById('btn-goto-quiz').addEventListener('click', () => {
      const mod = ModuleData[activeModuleIndex];
      if (!mod) return;
      document.getElementById('step-theory').classList.add('hidden');
      document.getElementById('step-theory').style.display = 'none';
      document.getElementById('step-quiz').classList.remove('hidden');
      document.getElementById('step-quiz').style.display = 'block';
      document.getElementById('step-indicator-1').style.background = 'var(--success)';
      document.getElementById('step-indicator-2').style.background = 'var(--primary)';
      renderQuiz(mod);
    });

    function renderQuiz(mod) {
      const quiz = mod.quiz;
      document.getElementById('quiz-question').textContent = quiz.question;
      const optionsContainer = document.getElementById('quiz-options');
      const feedbackDiv = document.getElementById('quiz-feedback');
      const nextBtn = document.getElementById('btn-next-module');
      feedbackDiv.classList.add('hidden');
      feedbackDiv.style.display = 'none';
      nextBtn.classList.add('hidden');
      nextBtn.style.display = 'none';

      const letters = ['A', 'B', 'C', 'D'];
      optionsContainer.innerHTML = quiz.options.map((opt, i) => `
        <button class="quiz-option" data-index="${i}" id="quiz-opt-${i}"><strong>${letters[i]}.</strong> ${opt}</button>
      `).join('');

      optionsContainer.querySelectorAll('.quiz-option').forEach(btn => {
        btn.addEventListener('click', async () => {
          const selectedIndex = parseInt(btn.dataset.index);
          const isCorrect = selectedIndex === quiz.correctIndex;
          optionsContainer.querySelectorAll('.quiz-option').forEach(b => { b.disabled = true; b.style.pointerEvents = 'none'; });

          if (isCorrect) {
            btn.classList.add('correct');
            feedbackDiv.className = 'quiz-feedback quiz-feedback-correct';
            feedbackDiv.innerHTML = '🎉 Benar! Keren banget! +50 XP';
            feedbackDiv.classList.remove('hidden');
            feedbackDiv.style.display = 'block';
            await AppState.addXP(50);
            await AppState.completeModule(mod.id);
            const rect = btn.getBoundingClientRect();
            UI.showXPFloat(50, rect.left + rect.width / 2, rect.top);
            UI.showToast(`+50 XP! Modul "${mod.title}" selesai! ✅`, 'xp');
            UI.renderSidebar('course');
            nextBtn.classList.remove('hidden');
            nextBtn.style.display = 'flex';

            const user = AppState.getUser();
            if ((user.completedModules || []).length >= ModuleData.length) {
              nextBtn.innerHTML = '🎉 Semua Modul Selesai!';
              nextBtn.onclick = () => { closeModal(); renderSyllabus(); };
            } else {
              nextBtn.onclick = () => {
                closeModal();
                renderSyllabus();
                const nextIndex = activeModuleIndex + 1;
                if (nextIndex < ModuleData.length) setTimeout(() => openLesson(nextIndex), 400);
              };
            }
          } else {
            btn.classList.add('wrong');
            const correctBtn = optionsContainer.querySelector(`[data-index="${quiz.correctIndex}"]`);
            if (correctBtn) correctBtn.classList.add('correct');
            feedbackDiv.className = 'quiz-feedback quiz-feedback-wrong';
            feedbackDiv.innerHTML = `😢 Coba Lagi! Jawaban: <strong>${letters[quiz.correctIndex]}. ${quiz.options[quiz.correctIndex]}</strong>`;
            feedbackDiv.classList.remove('hidden');
            feedbackDiv.style.display = 'block';
            await AppState.recordWeakness(quiz.topic);
            setTimeout(() => {
              optionsContainer.querySelectorAll('.quiz-option').forEach(b => { b.disabled = false; b.style.pointerEvents = 'auto'; b.classList.remove('correct', 'wrong'); });
              feedbackDiv.classList.add('hidden');
              feedbackDiv.style.display = 'none';
              UI.showToast('Coba jawab lagi! Kamu pasti bisa! 💪', 'info');
            }, 2500);
          }
        });
      });
    }

    renderSyllabus();
  </script>
</body>
</html>
