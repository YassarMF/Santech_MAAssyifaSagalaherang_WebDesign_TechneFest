<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive HTML Track | EduVerse</title>
  <meta name="description" content="Belajar HTML secara interaktif dengan live preview.">

  <!-- Styles -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../assets/css/main.css">
  
  <!-- CodeMirror CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/monokai.min.css">

</head>
<body>

  <div class="interactive-container">
    
    <!-- Sidebar: Module List -->
    <aside class="interactive-sidebar">
      <div class="interactive-sidebar-header">
        <a href="dashboard.html" style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: inherit; text-decoration: none;">
          <i class="fa-solid fa-arrow-left"></i>
          <span style="font-family: var(--font-heading); font-weight: 800;">Kembali ke Dashboard</span>
        </a>
        <h2 style="margin-top: 1rem; font-size: 1.25rem;">Web Developer Track</h2>
        <p style="font-size: 0.8rem; color: var(--text-muted); font-weight: 600;">HTML Dasar</p>
      </div>
      <div id="module-list">
        <!-- Rendered by JS -->
      </div>
    </aside>

    <!-- Main Content -->
    <main class="interactive-main">
      
      <!-- Topbar -->
      <div class="interactive-topbar" style="position: sticky; top: 0; z-index: 10;">
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <button class="mobile-track-menu-btn" onclick="document.querySelector('.interactive-sidebar').classList.toggle('show-dropdown')" aria-label="Toggle Menu">
            <i class="fa-solid fa-bars"></i>
          </button>
          <span class="neo-badge neo-badge-lemon" id="topbar-title">Web Dev Track</span>
        </div>
        <div style="display: flex; gap: 1rem; align-items: center;">
          <span class="neo-badge neo-badge-orange">
            <span class="streak-fire" id="user-streak">🔥 1</span>
          </span>
          <button id="btn-complete" aria-label="Selesai dan Lanjut" class="neo-btn neo-btn-success neo-btn-sm hidden">
            <i class="fa-solid fa-check"></i> Selesai & Lanjut
          </button>
        </div>
      </div>

      <!-- Workspace: Theory + Editor + Preview -->
      <div class="interactive-workspace">
        
        <!-- Left Pane: Theory -->
        <div class="pane-theory">
          <div class="pane-header">
            <span><i class="fa-solid fa-book-open"></i> Materi & Tugas</span>
          </div>
          <div class="theory-content" id="theory-content" style="padding-top: 1rem;">
            <!-- Rendered by JS -->
          </div>
        </div>

        <!-- Middle Pane: Code Editor -->
        <div class="pane-editor">
          <div class="pane-header">
            <span><i class="fa-solid fa-code"></i> index.html</span>
            <button id="btn-reset" aria-label="Reset Code" style="background:none; border:none; color:var(--text); cursor:pointer; font-weight:700;">
              <i class="fa-solid fa-rotate-right"></i> Reset
            </button>
          </div>
          <div class="editor-container">
            <textarea id="code-editor"></textarea>
          </div>
        </div>

        <!-- Right Pane: Live Preview -->
        <div class="pane-preview">
          <div class="pane-header" style="background: var(--bg-cream);">
            <span><i class="fa-solid fa-desktop"></i> Live Preview</span>
          </div>
          <div class="preview-container">
            <iframe id="live-preview" style="width: 100%; height: 100%; border: none; background: #fff;"></iframe>
          </div>
        </div>

      </div>

    </main>
  </div>

  <!-- CodeMirror JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/htmlmixed/htmlmixed.min.js"></script>

  <!-- Interactive Logic -->
  <script type="module" src="../assets/js/pages/interactive.js"></script>

</body>
</html>
